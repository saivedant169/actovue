name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CPU torch and the package
        run: |
          python -m pip install --upgrade pip
          # CPU torch keeps the runner light; no CUDA and no vLLM are needed for
          # the non-gpu suite.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test (CPU only)
        run: pytest -m "not gpu and not network" -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and check the wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
